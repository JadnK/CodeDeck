services:
  codedeck:
    image: ${CODEDECK_IMAGE:-ghcr.io/jadnk/codedeck-web:latest}
    build:
      context: ..
      dockerfile: hosted/Dockerfile
    restart: unless-stopped
    ports:
      - "${CODEDECK_BIND_ADDRESS:-127.0.0.1}:${CODEDECK_PORT:-8080}:8080"
    environment:
      CODEDECK_WEB_TOKEN: ${CODEDECK_WEB_TOKEN:?Set CODEDECK_WEB_TOKEN in hosted/.env}
      CODEDECK_PROJECTS_ROOT: /projects
      CODEDECK_DATA_DIR: /data
      CODEDECK_VERSION: ${CODEDECK_VERSION:-hosted}
      CODEDECK_MAX_BODY_BYTES: ${CODEDECK_MAX_BODY_BYTES:-2097152}
      CODEDECK_MAX_PROCESS_LOG_LINES: ${CODEDECK_MAX_PROCESS_LOG_LINES:-500}
    volumes:
      - type: volume
        source: codedeck-data
        target: /data
      - type: bind
        source: ${CODEDECK_PROJECTS_PATH:?Set CODEDECK_PROJECTS_PATH in hosted/.env}
        target: /projects
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  codedeck-data:
