name: Bug report
description: Report a reproducible problem in CodeDeck
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove secrets and private paths from logs and screenshots.

  - type: input
    id: version
    attributes:
      label: CodeDeck version
      description: The version shown in the app or release name.
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Ubuntu or another Linux distribution
        - Other
    validations:
      required: true

  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: "x64, ARM64, Apple Silicon"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant output. Remove tokens, usernames and private paths.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or anything else that may help.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets and private information from this report.
          required: true
        - label: This is not a security vulnerability.
          required: true
