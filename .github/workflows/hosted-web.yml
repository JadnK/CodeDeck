name: Hosted web image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "hosted/**"
      - ".github/workflows/hosted-web.yml"
  pull_request:
    paths:
      - "hosted/**"
      - ".github/workflows/hosted-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: hosted-web-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  test:
    name: Test hosted backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run tests
        run: node --test hosted/server/*.test.mjs
      - name: Validate JavaScript
        run: |
          node --check hosted/server/index.mjs
          node --check hosted/server/lib.mjs
          node --check hosted/public/app.js

  image:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Normalize image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/codedeck-web" >> "$GITHUB_OUTPUT"
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=CodeDeck Hosted
            org.opencontainers.image.description=Self-hosted web edition of CodeDeck
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hosted/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
