name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest
          - macos-15

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: pnpm einrichten
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Node.js 24 mit pnpm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          package-manager-cache: false

      - name: Rust stable einrichten
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Buildcache einrichten
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci-${{ matrix.platform }}

      - name: Linux-Systempakete installieren
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Frontend-Abhängigkeiten reproduzierbar installieren
        run: pnpm install --frozen-lockfile

      - name: TypeScript und Frontend bauen
        run: pnpm build

      - name: Tauri/Rust prüfen
        run: cargo check --manifest-path src-tauri/Cargo.toml
