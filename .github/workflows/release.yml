name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build, for example v1.0.1"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Verify manual runs use the default branch
        if: github.event_name == 'workflow_dispatch' && github.ref_name != github.event.repository.default_branch
        shell: bash
        run: |
          echo "::error::Select '${{ github.event.repository.default_branch }}' in the 'Use workflow from' menu. The selected ref is '${{ github.ref_name }}'."
          exit 1

      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Repository secret TAURI_SIGNING_PRIVATE_KEY is missing. See docs/updater-setup.md."
            exit 1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::Repository secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD is missing. See docs/updater-setup.md."
            exit 1
          fi

      - name: Validate tag, versions and release notes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.RELEASE_TAG;
          const match = /^v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/.exec(tag);
          if (!match) {
            throw new Error(`Invalid release tag: ${tag}. Expected a tag such as v1.0.1.`);
          }

          const expected = match[1];
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoLock = fs.readFileSync('src-tauri/Cargo.lock', 'utf8');

          const cargoVersion = /^version\s*=\s*"([^"]+)"/m.exec(cargoToml)?.[1];
          const cargoLockVersion = /\[\[package\]\]\nname = "code-deck"\nversion = "([^"]+)"/m.exec(cargoLock)?.[1];

          const versions = {
            'package.json': packageJson.version,
            'src-tauri/tauri.conf.json': tauriConfig.version,
            'src-tauri/Cargo.toml': cargoVersion,
            'src-tauri/Cargo.lock': cargoLockVersion,
          };

          const mismatches = Object.entries(versions)
            .filter(([, version]) => version !== expected)
            .map(([file, version]) => `${file}: ${version ?? 'missing'}`);

          if (mismatches.length > 0) {
            throw new Error(
              `Tag ${tag} expects version ${expected}, but these files do not match:\n` +
              mismatches.join('\n')
            );
          }

          const notesPath = `RELEASE_NOTES_v${expected}.md`;
          if (!fs.existsSync(notesPath)) {
            throw new Error(
              `${notesPath} is missing. Add curated English release notes before creating the tag.`
            );
          }

          const notes = fs.readFileSync(notesPath, 'utf8').trim();
          if (notes.length < 120) {
            throw new Error(`${notesPath} is too short to be useful.`);
          }

          console.log(`Release ${tag} is consistent and ${notesPath} is ready.`);
          NODE

  prepare-release:
    name: Prepare release draft
    needs: validate
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_url: ${{ steps.release.outputs.release_url }}

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Create or reuse the GitHub release draft
        id: release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          retries: 3
          script: |
            const fs = require('node:fs');

            const tag = process.env.RELEASE_TAG;
            const version = tag.replace(/^v/, '');
            const prerelease = tag.includes('-');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const notesPath = `RELEASE_NOTES_v${version}.md`;
            const body = fs.readFileSync(notesPath, 'utf8').trim();

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );

            let release = releases.find((item) => item.tag_name === tag);

            if (release && !release.draft) {
              core.setFailed(
                `A published release already exists for ${tag}. Create a new version tag instead.`
              );
              return;
            }

            if (release) {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: tag,
                name: `CodeDeck ${tag}`,
                body,
                draft: true,
                prerelease
              });
              release = updated.data;
              core.info(`Reusing release draft: ${release.html_url}`);
            } else {
              try {
                const tagRef = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `tags/${tag}`
                });
                core.info(`Found release tag ${tag} at ${tagRef.data.object.sha}.`);
              } catch (error) {
                if (error.status === 404) {
                  core.setFailed(
                    `Tag ${tag} does not exist on GitHub. Push it first with: git push origin ${tag}`
                  );
                  return;
                }
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `CodeDeck ${tag}`,
                body,
                draft: true,
                prerelease
              });
              release = created.data;
              core.info(`Created release draft: ${release.html_url}`);
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_url', release.html_url);

  build:
    name: Build ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 90
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: ""
            rust_targets: ""
          - name: Linux
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - name: macOS Universal
            platform: macos-15
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Set up Node.js 24 with pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          package-manager-cache: false

      - name: Set up stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Restore Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-${{ matrix.platform }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the Tauri application and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "CodeDeck_[version]_[platform]_[arch][setup][ext]"
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "CodeDeck_[version]_[platform]_[arch]_[bundle]"
          args: ${{ matrix.args }}

  verify:
    name: Verify release assets
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Validate the updater manifest
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
          EXPECTED_VERSION: ${{ env.RELEASE_TAG }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const expectedVersion = process.env.EXPECTED_VERSION.replace(/^v/, '');

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: releaseId,
              per_page: 100
            });

            const manifestAsset = assets.find((asset) => asset.name === 'latest.json');
            if (!manifestAsset) {
              core.setFailed(
                'latest.json is missing from the release draft. In-app updates would not work.'
              );
              return;
            }

            const response = await github.request(
              'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
              {
                owner,
                repo,
                asset_id: manifestAsset.id,
                headers: { accept: 'application/octet-stream' }
              }
            );

            const buffer = Buffer.isBuffer(response.data)
              ? response.data
              : Buffer.from(response.data);

            let manifest;
            try {
              manifest = JSON.parse(buffer.toString('utf8'));
            } catch (error) {
              core.setFailed(`latest.json is not valid JSON: ${error.message}`);
              return;
            }

            if (manifest.version !== expectedVersion) {
              core.setFailed(
                `latest.json contains version ${manifest.version ?? 'unknown'}, expected ${expectedVersion}.`
              );
              return;
            }

            const platforms = Object.entries(manifest.platforms ?? {});
            if (platforms.length < 3) {
              core.setFailed(
                `latest.json contains only ${platforms.length} platform entries. Windows, macOS and Linux are required.`
              );
              return;
            }

            const invalidPlatforms = platforms
              .filter(([, value]) => !value?.url || !value?.signature)
              .map(([name]) => name);

            if (invalidPlatforms.length > 0) {
              core.setFailed(
                `latest.json contains incomplete update data for: ${invalidPlatforms.join(', ')}.`
              );
              return;
            }

            core.info(
              `Validated updater manifest ${manifest.version} with ${platforms.length} platform entries.`
            );

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## CodeDeck ${RELEASE_TAG} is ready"
            echo
            echo "All platform packages and updater files were uploaded to the release draft."
            echo
            echo "Review the draft: ${{ needs.prepare-release.outputs.release_url }}"
            echo
            echo "After checking the assets and release notes, click **Publish release**."
          } >> "$GITHUB_STEP_SUMMARY"
