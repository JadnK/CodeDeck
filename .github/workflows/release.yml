name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Vorhandenen Tag bauen, z. B. v0.2.0"
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.33.0"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    name: Release prüfen
    runs-on: ubuntu-22.04

    steps:
      - name: Manuelle Ausführung vom Standardbranch prüfen
        if: github.event_name == 'workflow_dispatch' && github.ref_name != github.event.repository.default_branch
        shell: bash
        run: |
          echo "::error::Wähle bei 'Use workflow from' den Branch '${{ github.event.repository.default_branch }}'. Aktuell ausgewählt ist '${{ github.ref_name }}'."
          exit 1

      - name: Repository und Release-Tag auschecken
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Updater-Signierschlüssel prüfen
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Repository secret TAURI_SIGNING_PRIVATE_KEY fehlt. Siehe docs/updater-setup.md."
            exit 1
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::error::Repository secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD fehlt. Siehe docs/updater-setup.md."
            exit 1
          fi

      - name: Tag und App-Versionen prüfen
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.RELEASE_TAG;
          const match = /^v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$/.exec(tag);
          if (!match) {
            throw new Error(`Ungültiger Release-Tag: ${tag}. Erwartet wird z. B. v0.2.0.`);
          }

          const expected = match[1];
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = /^version\s*=\s*"([^"]+)"/m.exec(cargoToml)?.[1];

          const versions = {
            'package.json': packageJson.version,
            'src-tauri/tauri.conf.json': tauriConfig.version,
            'src-tauri/Cargo.toml': cargoVersion,
          };

          const mismatches = Object.entries(versions)
            .filter(([, version]) => version !== expected)
            .map(([file, version]) => `${file}: ${version ?? 'fehlt'}`);

          if (mismatches.length > 0) {
            throw new Error(
              `Der Tag ${tag} erwartet Version ${expected}, aber folgende Dateien weichen ab:\n` +
              mismatches.join('\n')
            );
          }

          console.log(`Release ${tag} ist konsistent.`);
          NODE

  prepare-release:
    name: Release-Entwurf vorbereiten
    needs: validate
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_url: ${{ steps.release.outputs.release_url }}

    steps:
      - name: GitHub-Release-Entwurf erstellen oder wiederverwenden
        id: release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        with:
          retries: 3
          script: |
            const tag = process.env.RELEASE_TAG;
            const prerelease = tag.includes('-');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = [
              `## Code Deck ${tag}`,
              '',
              'Lokales Desktop-Dashboard zum Organisieren, Öffnen und Starten von Entwicklungsprojekten.',
              '',
              '### Downloads',
              '- **Windows:** MSI oder Setup-EXE',
              '- **macOS:** DMG als Universal-Build für Intel und Apple Silicon',
              '- **Linux:** AppImage oder DEB',
              '',
              '### Installation',
              'Lade unter Assets das passende Installationspaket herunter und starte es.',
              '',
              '> Die Builds sind aktuell nicht mit einem kostenpflichtigen Plattform-Zertifikat signiert. Windows SmartScreen oder macOS Gatekeeper können deshalb beim ersten Start eine Warnung anzeigen.'
            ].join('\n');

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner, repo, per_page: 100 }
            );

            let release = releases.find(item => item.tag_name === tag);

            if (release && !release.draft) {
              core.setFailed(`Für ${tag} existiert bereits ein veröffentlichter Release. Verwende einen neuen Tag.`);
              return;
            }

            if (release) {
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: tag,
                name: `Code Deck ${tag}`,
                body,
                draft: true,
                prerelease
              });
              release = updated.data;
              core.info(`Vorhandener Release-Entwurf wird wiederverwendet: ${release.html_url}`);
            } else {
              // The workflow checks out an already existing Git tag before this job.
              // target_commitish only accepts a branch or commit SHA when GitHub
              // needs to create a new tag, so it must not be set to the tag name.
              try {
                const tagRef = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `tags/${tag}`
                });
                core.info(`Release-Tag gefunden: ${tag} -> ${tagRef.data.object.sha}`);
              } catch (error) {
                if (error.status === 404) {
                  core.setFailed(
                    `Der Tag ${tag} existiert nicht auf GitHub. Push ihn zuerst mit: git push origin ${tag}`
                  );
                  return;
                }
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: `Code Deck ${tag}`,
                body,
                draft: true,
                prerelease,
                generate_release_notes: true
              });
              release = created.data;
              core.info(`Release-Entwurf erstellt: ${release.html_url}`);
            }

            core.setOutput('release_id', String(release.id));
            core.setOutput('release_url', release.html_url);

  build:
    name: ${{ matrix.name }}
    needs: prepare-release
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: ""
            rust_targets: ""
          - name: Linux
            platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - name: macOS Universal
            platform: macos-15
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"

    steps:
      - name: Repository und Release-Tag auschecken
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: pnpm einrichten
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Node.js 24 mit pnpm-Cache einrichten
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          package-manager-cache: false

      - name: Rust stable einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust-Buildcache einrichten
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-${{ matrix.platform }}

      - name: Linux-Systempakete installieren
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Frontend-Abhängigkeiten reproduzierbar installieren
        run: pnpm install --frozen-lockfile

      - name: Tauri-App bauen und Release-Artefakte hochladen
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          releaseAssetNamePattern: "Code-Deck_[version]_[platform]_[arch][setup][ext]"
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: "Code-Deck_[version]_[platform]_[arch]_[bundle]"
          args: ${{ matrix.args }}

  done:
    name: Release bereit
    permissions:
      contents: write
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-22.04

    steps:
      - name: Updater-Manifest im Release prüfen
        uses: actions/github-script@v9
        env:
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
          EXPECTED_VERSION: ${{ env.RELEASE_TAG }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const releaseId = Number(process.env.RELEASE_ID);
            const expectedVersion = process.env.EXPECTED_VERSION.replace(/^v/, '');
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: releaseId,
              per_page: 100
            });

            const manifestAsset = assets.find((asset) => asset.name === 'latest.json');
            if (!manifestAsset) {
              core.setFailed(
                'latest.json fehlt im Release-Entwurf. Der In-App-Updater würde deshalb keine Updates finden.'
              );
              return;
            }

            const response = await github.request(
              'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
              {
                owner,
                repo,
                asset_id: manifestAsset.id,
                headers: { accept: 'application/octet-stream' }
              }
            );
            const buffer = Buffer.isBuffer(response.data)
              ? response.data
              : Buffer.from(response.data);

            let manifest;
            try {
              manifest = JSON.parse(buffer.toString('utf8'));
            } catch (error) {
              core.setFailed(`latest.json ist kein gültiges JSON: ${error.message}`);
              return;
            }

            if (manifest.version !== expectedVersion) {
              core.setFailed(
                `latest.json enthält Version ${manifest.version ?? 'unbekannt'}, erwartet wurde ${expectedVersion}.`
              );
              return;
            }
            const platforms = Object.entries(manifest.platforms ?? {});
            if (platforms.length < 3) {
              core.setFailed(
                `latest.json enthält nur ${platforms.length} Plattform(en). Erwartet werden Windows, macOS und Linux.`
              );
              return;
            }
            const invalidPlatforms = platforms
              .filter(([, value]) => !value?.url || !value?.signature)
              .map(([name]) => name);
            if (invalidPlatforms.length > 0) {
              core.setFailed(
                `latest.json enthält unvollständige Update-Daten für: ${invalidPlatforms.join(', ')}.`
              );
              return;
            }

            core.info(
              `Updater-Manifest geprüft: ${manifest.version}, ${platforms.length} Plattform(en).`
            );

      - name: Zusammenfassung schreiben
        shell: bash
        run: |
          {
            echo "## Code Deck ${RELEASE_TAG} ist gebaut"
            echo
            echo "Alle Plattform-Artefakte wurden in den Release-Entwurf hochgeladen."
            echo
            echo "Öffne den Entwurf unter: ${{ needs.prepare-release.outputs.release_url }}"
            echo
            echo "Prüfe die Dateien und klicke anschließend auf **Publish release**."
          } >> "$GITHUB_STEP_SUMMARY"
